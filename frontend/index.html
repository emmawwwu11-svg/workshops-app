<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Workshops Profesionales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding: 20px; }
        .card { margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">🎓 Talleres Profesionales</h1>
        <div id="workshops-list" class="row">Cargando talleres...</div>
    </div>

    <script>
        async function cargarTalleres() {
            try {
                const response = await fetch('https://dck2bexy89.execute-api.us-east-1.amazonaws.com/dev/workshops');
                const data = await response.json();
                
                const container = document.getElementById('workshops-list');
                
                if (data.workshops && data.workshops.length > 0) {
                    container.innerHTML = data.workshops.map(workshop => `
                        <div class="col-md-4">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">${workshop.name}</h5>
                                    <span class="badge bg-primary mb-2">${workshop.category}</span>
                                    <p class="card-text">${workshop.description || 'Sin descripción'}</p>
                                    <p class="card-text">
                                        <small class="text-muted">
                                            📍 ${workshop.location}<br>
                                            📅 ${new Date(workshop.startAt).toLocaleString()}<br>
                                            👥 Capacidad: ${workshop.capacity}
                                        </small>
                                    </p>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="alert alert-info">No hay talleres disponibles</div>';
                }
            } catch (error) {
                document.getElementById('workshops-list').innerHTML = `
                    <div class="alert alert-danger">
                        Error al cargar talleres: ${error.message}<br>
                        Verifica que la API esté disponible.
                    </div>
                `;
            }
        }
        
        cargarTalleres();
    </script>
</body>
</html>
